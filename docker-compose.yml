version: '3.8'

services:
  whatsapp-api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    mem_limit: 4g
    mem_reservation: 2g
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_KEY=${API_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./sessions:/app/sessions
    restart: always
