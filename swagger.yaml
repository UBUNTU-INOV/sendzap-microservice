openapi: 3.0.0
info:
  title: WhatsApp Noweb API
  description: |
    A robust, modular WhatsApp API using @whiskeysockets/baileys. Optimized for high-density microservice deployment.
    
    ### Rate Limiting
    - **Global**: 100 requests per 15 minutes per IP.
    - **Messaging**: 30 requests per minute per IP for `/send`, `/send-bulk`, `/send-contact`, `/channels/send`.
    - **Number Check**: 60 requests per minute per IP for `/check-number`.
  version: 2.0.0
servers:
  - url: http://localhost:3000
    description: Local/Dev server

tags:
  - name: Health
    description: Monitoring and system statistics
  - name: Sessions
    description: WhatsApp session management and authentication
  - name: Messages
    description: Sending and managing messages
  - name: Groups
    description: Comprehensive group management
  - name: Status
    description: WhatsApp Status (Stories) updates
  - name: Channels
    description: WhatsApp Channels (Newsletters) management

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY

security:
  - ApiKeyAuth: []

paths:
  # --- HEALTH ---
  /health:
    get:
      tags:
        - Health
      summary: Health Check and System Stats
      description: Returns the health status of the service along with CPU, RAM, and session statistics.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  uptime:
                    type: object
                  system:
                    type: object
                  process:
                    type: object
                  sessions:
                    type: object

  # --- SESSIONS ---
  /sessions:
    get:
      tags:
        - Sessions
      summary: List all sessions
      description: Retrieve a list of all active and saved sessions.
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    status:
                      type: string
                    hasQR:
                      type: boolean

  /session/{id}:
    post:
      tags:
        - Sessions
      summary: Create or Resume Session
      description: Initialize a new session or reconnect an existing one. Returns QR code if not connected.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session created or status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  qr:
                    type: string
                    description: Base64 encoded QR image (if applicable)

    get:
      tags:
        - Sessions
      summary: Get Session Status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current session status
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string

    delete:
      tags:
        - Sessions
      summary: Delete Session
      description: Logout and remove session data from memory and database.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session deleted

  /session/{id}/qr:
    get:
      tags:
        - Sessions
      summary: Get QR Code Image
      description: View the QR code directly as a PNG image for easy scanning.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            image/png:
              schema:
                type: string
                format: binary

  # --- MESSAGES ---
  /send:
    post:
      tags:
        - Messages
      summary: Send Message
      description: Send text or media (image, video, audio, document) to a single recipient or group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - to
              properties:
                sessionId:
                  type: string
                to:
                  type: string
                  description: Phone number (229...) or Group JID
                message:
                  type: string
                  description: Text content
                mediaUrl:
                  type: string
                  description: URL of the file to send
                mediaType:
                  type: string
                  enum: [image, video, audio, document]
                caption:
                  type: string
                  description: Caption for image/video
                fileName:
                  type: string
                  description: Name for document files
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  messageId:
                    type: string

  /send-bulk:
    post:
      tags:
        - Messages
      summary: Send Bulk Messages
      description: Send the same message to multiple recipients with a configurable delay to avoid bans.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - receivers
                - message
              properties:
                sessionId:
                  type: string
                receivers:
                  type: array
                  items:
                    type: string
                message:
                  type: string
                delayMs:
                  type: integer
                  description: Delay between messages in milliseconds
                  default: 1000
                mediaUrl:
                  type: string
                mediaType:
                  type: string
                  enum: [image, video, audio, document]
                caption:
                  type: string
                fileName:
                  type: string
      responses:
        '200':
          description: Bulk processing completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  results:
                    type: array
                    items:
                      type: object

  /send-contact:
    post:
      tags:
        - Messages
      summary: Send Contact VCard
      description: Send a contact card to a recipient.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - to
                - contactName
                - contactNumber
              properties:
                sessionId:
                  type: string
                to:
                  type: string
                contactName:
                  type: string
                contactNumber:
                  type: string
                organization:
                  type: string
      responses:
        '200':
          description: Contact sent

  /check-number:
    post:
      tags:
        - Messages
      summary: Check WhatsApp Number
      description: Verify if a phone number exists on WhatsApp and get its JID/Picture.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - number
              properties:
                sessionId:
                  type: string
                number:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  number:
                    type: string
                  exists:
                    type: boolean
                  jid:
                    type: string
                  profilePictureUrl:
                    type: string

  /set-typing:
    post:
      tags:
        - Messages
      summary: Set Typing/Presence Status
      description: Show "typing..." or "recording audio..." status to a recipient.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - to
              properties:
                sessionId:
                  type: string
                to:
                  type: string
                presence:
                  type: string
                  description: Presence state
                  enum: [composing, recording, paused]
                  default: composing
      responses:
        '200':
          description: Status updated

  /contacts/{sessionId}:
    get:
      tags:
        - Messages
      summary: List Contacts
      description: Retrieve a list of known contacts.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of contacts

  # --- GROUPS ---
  /groups/{sessionId}:
    get:
      tags:
        - Groups
      summary: List All Participating Groups
      description: Get all groups the current session is a member of.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of groups

  /groups/{sessionId}/{groupId}:
    get:
      tags:
        - Groups
      summary: Get Group Metadata & Members
      description: Retrieve detailed information about a specific group, including its member list and roles.
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
        - in: path
          name: groupId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group details retrieved
          content:
            application/json:
              schema:
                type: object

  /groups/create:
    post:
      tags:
        - Groups
      summary: Create New Group
      description: Create a new WhatsApp group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - subject
              properties:
                sessionId:
                  type: string
                subject:
                  type: string
                  description: Group name
                participants:
                  type: array
                  description: Optional list of member phone numbers
                  items:
                    type: string
      responses:
        '200':
          description: Group created

  /groups/leave:
    post:
      tags:
        - Groups
      summary: Leave Group
      description: Leave a WhatsApp group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - groupId
              properties:
                sessionId:
                  type: string
                groupId:
                  type: string
      responses:
        '200':
          description: Left the group

  /groups/participants/{sessionId}/{groupId}:
    get:
      tags:
        - Groups
      summary: Get Group Participants with Roles
      description: Get the list of participants in a group with their admin/member roles.
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
        - in: path
          name: groupId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Participants list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  groupId:
                    type: string
                  groupName:
                    type: string
                  count:
                    type: integer
                  participants:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        admin:
                          type: string
                        isAdmin:
                          type: boolean
                        isSuperAdmin:
                          type: boolean

  /groups/participants/add:
    post:
      tags:
        - Groups
      summary: Add Participants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - groupId
                - participants
              properties:
                sessionId:
                  type: string
                groupId:
                  type: string
                participants:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Participants added

  /groups/participants/remove:
    post:
      tags:
        - Groups
      summary: Remove Participants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - groupId
                - participants
              properties:
                sessionId:
                  type: string
                groupId:
                  type: string
                participants:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Participants removed

  /groups/participants/update:
    post:
      tags:
        - Groups
      summary: Promote/Demote Participants
      description: Change participant roles (admin/member).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - groupId
                - participants
                - action
              properties:
                sessionId:
                  type: string
                groupId:
                  type: string
                participants:
                  type: array
                  items:
                    type: string
                action:
                  type: string
                  enum: [promote, demote]
      responses:
        '200':
          description: Roles updated

  /groups/invite-code/{sessionId}/{groupId}:
    get:
      tags:
        - Groups
      summary: Get Group Invite Link
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite URL retrieved

  /groups/revoke-invite:
    post:
      tags:
        - Groups
      summary: Revoke Invite Link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - groupId
              properties:
                sessionId:
                  type: string
                groupId:
                  type: string
      responses:
        '200':
          description: Link revoked

  /groups/join-invite:
    post:
      tags:
        - Groups
      summary: Join Group via Link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - code
              properties:
                sessionId:
                  type: string
                code:
                  type: string
                  description: The invite code (part after chat.whatsapp.com/)
      responses:
        '200':
          description: Joined group

  /groups/settings:
    post:
      tags:
        - Groups
      summary: Update Group Permissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - groupId
                - setting
              properties:
                sessionId:
                  type: string
                groupId:
                  type: string
                setting:
                  type: string
                  enum: [announcement, not-announcement, locked, unlocked]
      responses:
        '200':
          description: Settings updated

  /groups/identity:
    post:
      tags:
        - Groups
      summary: Update Group Info
      description: Change name, description, or icon.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - groupId
                - type
                - value
              properties:
                sessionId:
                  type: string
                groupId:
                  type: string
                type:
                  type: string
                  enum: [subject, description, picture]
                value:
                  type: string
                  description: New text or Image URL
      responses:
        '200':
          description: Identity updated

  # --- STATUS ---
  /status/send:
    post:
      tags:
        - Status
      summary: Send Status (Story)
      description: Post a text, image, video, or audio status update with optional background color and font for text stories.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
              properties:
                sessionId:
                  type: string
                mediaType:
                  type: string
                  enum: [text, image, video, audio]
                  default: text
                message:
                  type: string
                  description: Text content (for text status)
                mediaUrl:
                  type: string
                  description: Media URL (required for image/video/audio)
                caption:
                  type: string
                backgroundColor:
                  type: string
                  description: Background color for text status (e.g. '#FF5733')
                font:
                  type: integer
                  description: Font style (0-5) for text status
      responses:
        '200':
          description: Status posted

  /status/delete:
    post:
      tags:
        - Status
      summary: Delete Status
      description: Delete a previously posted status update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - messageId
              properties:
                sessionId:
                  type: string
                messageId:
                  type: string
                  description: The message ID of the status to delete
      responses:
        '200':
          description: Status deleted

  # --- CHANNELS (NEWSLETTERS) ---
  /channels/{sessionId}:
    get:
      tags:
        - Channels
      summary: List Subscribed Channels
      description: Get all channels/newsletters the session is subscribed to.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  count:
                    type: integer
                  channels:
                    type: array
                    items:
                      type: object

  /channels/create:
    post:
      tags:
        - Channels
      summary: Create Channel
      description: Create a new WhatsApp Channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - name
              properties:
                sessionId:
                  type: string
                name:
                  type: string
                  description: Channel name
                description:
                  type: string
                  description: Channel description
      responses:
        '200':
          description: Channel created

  /channels/send:
    post:
      tags:
        - Channels
      summary: Send Channel Message
      description: Send a text or media message to a WhatsApp Channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - channelId
              properties:
                sessionId:
                  type: string
                channelId:
                  type: string
                  description: Channel JID or ID
                message:
                  type: string
                mediaUrl:
                  type: string
                mediaType:
                  type: string
                  enum: [image, video, audio, document]
                caption:
                  type: string
      responses:
        '200':
          description: Message sent to channel

  /channels/info/{sessionId}/{channelId}:
    get:
      tags:
        - Channels
      summary: Get Channel Info
      description: Get metadata about a specific channel.
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
        - in: path
          name: channelId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Channel info retrieved

  /channels/follow:
    post:
      tags:
        - Channels
      summary: Follow Channel
      description: Subscribe to a WhatsApp Channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - channelId
              properties:
                sessionId:
                  type: string
                channelId:
                  type: string
      responses:
        '200':
          description: Subscribed to channel

  /channels/unfollow:
    post:
      tags:
        - Channels
      summary: Unfollow Channel
      description: Unsubscribe from a WhatsApp Channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - channelId
              properties:
                sessionId:
                  type: string
                channelId:
                  type: string
      responses:
        '200':
          description: Unsubscribed from channel

  /channels/mute:
    post:
      tags:
        - Channels
      summary: Mute/Unmute Channel
      description: Mute or unmute notifications from a channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - channelId
              properties:
                sessionId:
                  type: string
                channelId:
                  type: string
                mute:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Channel mute status updated

  /channels/update:
    post:
      tags:
        - Channels
      summary: Update Channel Settings
      description: Update the name, description, or picture of a channel you own.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - channelId
                - type
                - value
              properties:
                sessionId:
                  type: string
                channelId:
                  type: string
                type:
                  type: string
                  enum: [name, description, picture]
                value:
                  type: string
                  description: New value (text or image URL for picture)
      responses:
        '200':
          description: Channel updated

  /channels/delete:
    post:
      tags:
        - Channels
      summary: Delete Channel
      description: Permanently delete a channel you own.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - channelId
              properties:
                sessionId:
                  type: string
                channelId:
                  type: string
      responses:
        '200':
          description: Channel deleted
